# MIDIRouter — Qt 6 + RtMidi, CMake builds on Linux, macOS, Windows (MSYS2).

name: CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-unix:
    name: Build (${{ matrix.artifact_os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_os: Linux
          - os: macos-latest
            artifact_os: macOS

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            qt6-base-dev \
            librtmidi-dev \
            pkg-config

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja qt@6 rtmidi pkgconf

      - name: Configure Homebrew paths for CMake (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qt@6);$(brew --prefix)" >> "$GITHUB_ENV"
          echo "$(brew --prefix qt@6)/bin" >> "$GITHUB_PATH"

      - name: Configure and build
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf "${GITHUB_WORKSPACE}/build"
          cmake -S "${GITHUB_WORKSPACE}" -B "${GITHUB_WORKSPACE}/build" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build "${GITHUB_WORKSPACE}/build" --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: midirouter_${{ matrix.artifact_os }}
          path: ${{ runner.os == 'macOS' && 'build/midirouter.app' || 'build/midirouter' }}
          if-no-files-found: warn
          retention-days: 14

  build-windows:
    name: Build (Windows MSYS2)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install MSYS2 and dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-ntldd-git

      - name: Install RtMidi (MSYS2)
        shell: msys2 {0}
        run: |
          pacman -S --noconfirm mingw-w64-x86_64-rtmidi 2>/dev/null || \
          pacman -S --noconfirm mingw-w64-ucrt-x86_64-rtmidi 2>/dev/null || \
          echo "RtMidi package missing — configure may fail"

      - name: Configure and build
        shell: msys2 {0}
        run: |
          set -euxo pipefail
          rm -rf "${GITHUB_WORKSPACE}/build"
          cmake -S "${GITHUB_WORKSPACE}" -B "${GITHUB_WORKSPACE}/build" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build "${GITHUB_WORKSPACE}/build" --parallel

      - name: Prepare Windows portable artifact (bundle Qt + DLL deps)
        shell: msys2 {0}
        run: |
          set -euxo pipefail
          ROOT="${GITHUB_WORKSPACE}"
          ARTIFACT_DIR="${ROOT}/midirouter_Windows"
          MINGW_BIN="/mingw64/bin"
          rm -rf "${ARTIFACT_DIR}"
          mkdir -p "${ARTIFACT_DIR}"

          cp "${ROOT}/build/midirouter.exe" "${ARTIFACT_DIR}/"

          # Qt deployment (QtCore6.dll, platforms/, styles/, etc.)
          # --compiler-runtime pulls in libstdc++/libgcc_s/libwinpthread, etc.
          if command -v windeployqt6 &>/dev/null; then
            windeployqt6 --compiler-runtime --no-translations --no-opengl-sw \
              "${ARTIFACT_DIR}/midirouter.exe"
          elif command -v windeployqt &>/dev/null; then
            windeployqt --compiler-runtime --no-translations --no-opengl-sw \
              "${ARTIFACT_DIR}/midirouter.exe"
          else
            echo "::warning::windeployqt not found; Qt DLLs may be missing"
          fi

          # Discover and copy any additional transitive DLL dependencies from MSYS2.
          # ntldd is MinGW's equivalent of ldd; -R walks the full dependency tree.
          collect_deps_pass() {
            local added=0
            local target
            shopt -s nullglob
            for target in "${ARTIFACT_DIR}"/*.exe "${ARTIFACT_DIR}"/*.dll; do
              ntldd -R "${target}" 2>/dev/null \
                | awk '/=>/ {print $3}' \
                | grep -i "/mingw64/" \
                | sort -u \
                | while read -r dep; do
                    [ -f "${dep}" ] || continue
                    name=$(basename "${dep}")
                    if [ ! -f "${ARTIFACT_DIR}/${name}" ]; then
                      cp "${dep}" "${ARTIFACT_DIR}/"
                      added=1
                    fi
                  done
            done
            shopt -u nullglob
            return ${added}
          }

          if command -v ntldd &>/dev/null; then
            for pass in 1 2 3 4 5; do
              before=$(ls -1 "${ARTIFACT_DIR}"/*.dll 2>/dev/null | wc -l)
              collect_deps_pass || true
              after=$(ls -1 "${ARTIFACT_DIR}"/*.dll 2>/dev/null | wc -l)
              [ "${before}" = "${after}" ] && break
            done
          else
            echo "::warning::ntldd not available; may miss non-Qt DLL deps"
          fi

          # Belt-and-braces: ensure RtMidi DLL is present if dynamically linked.
          shopt -s nullglob
          for dll in "${MINGW_BIN}"/librtmidi*.dll; do
            name=$(basename "${dll}")
            [ -f "${ARTIFACT_DIR}/${name}" ] || cp "${dll}" "${ARTIFACT_DIR}/" 2>/dev/null || true
          done
          shopt -u nullglob

          # Some DLLs may be loaded dynamically at runtime (not visible to ntldd).
          # Brotli is commonly required by Qt (e.g. for network/content decoding).
          for dll in libbrotlidec.dll libbrotlicommon.dll libbrotlienc.dll; do
            if [ -f "${MINGW_BIN}/${dll}" ] && [ ! -f "${ARTIFACT_DIR}/${dll}" ]; then
              cp "${MINGW_BIN}/${dll}" "${ARTIFACT_DIR}/" 2>/dev/null || true
            fi
          done

          # Compression / hashing / string conversion libs Qt may pull indirectly.
          for dll in zlib1.dll libzstd.dll libb2-1.dll libdouble-conversion.dll; do
            if [ -f "${MINGW_BIN}/${dll}" ] && [ ! -f "${ARTIFACT_DIR}/${dll}" ]; then
              cp "${MINGW_BIN}/${dll}" "${ARTIFACT_DIR}/" 2>/dev/null || true
            fi
          done

          # ICU + PCRE2 — Qt Core may load these dynamically (not always visible to ntldd).
          # Copy whatever versions MSYS2 ships (libicuin*, libicuuc*, libicudt*, libpcre2-16-*).
          shopt -s nullglob
          for dll in \
              "${MINGW_BIN}"/libicuin*.dll \
              "${MINGW_BIN}"/libicuuc*.dll \
              "${MINGW_BIN}"/libicudt*.dll \
              "${MINGW_BIN}"/libpcre2-16-*.dll; do
            [ -f "${dll}" ] || continue
            cp -f "${dll}" "${ARTIFACT_DIR}/"
          done
          shopt -u nullglob

          # windeployqt --compiler-runtime may copy older pthread/gcc than the toolchain that
          # linked midirouter.exe, causing missing pthread_cond_timedwait64 in libwinpthread.
          # Always end with the DLLs from the same MINGW64 prefix used for the build.
          for dll in libwinpthread-1.dll libgcc_s_seh-1.dll libstdc++-6.dll; do
            if [ -f "${MINGW_BIN}/${dll}" ]; then
              cp -f "${MINGW_BIN}/${dll}" "${ARTIFACT_DIR}/"
            fi
          done

          echo "Packaged files:"
          (cd "${ARTIFACT_DIR}" && ls -la)

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: midirouter_Windows
          path: midirouter_Windows/
          if-no-files-found: error
          retention-days: 14
