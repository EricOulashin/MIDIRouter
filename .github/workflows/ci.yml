# MIDIRouter — Qt 6 + RtMidi, CMake builds on Linux, macOS, Windows (MSYS2).

name: CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-unix:
    name: Build (${{ matrix.artifact_os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_os: Linux
          - os: macos-latest
            artifact_os: macOS

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            qt6-base-dev \
            librtmidi-dev \
            pkg-config

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja qt@6 rtmidi pkgconf

      - name: Configure Homebrew paths for CMake (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qt@6);$(brew --prefix)" >> "$GITHUB_ENV"
          echo "$(brew --prefix qt@6)/bin" >> "$GITHUB_PATH"

      - name: Configure and build
        shell: bash
        run: |
          set -euxo pipefail
          cmake -S "${GITHUB_WORKSPACE}" -B "${GITHUB_WORKSPACE}/build" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build "${GITHUB_WORKSPACE}/build" --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: midirouter_${{ matrix.artifact_os }}
          path: ${{ runner.os == 'macOS' && 'build/midirouter.app' || 'build/midirouter' }}
          if-no-files-found: warn
          retention-days: 14

  build-windows:
    name: Build (Windows MSYS2)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install MSYS2 and dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-pkg-config

      - name: Install RtMidi (MSYS2)
        shell: msys2 {0}
        run: |
          pacman -S --noconfirm mingw-w64-x86_64-rtmidi 2>/dev/null || \
          pacman -S --noconfirm mingw-w64-ucrt-x86_64-rtmidi 2>/dev/null || \
          echo "RtMidi package missing — configure may fail"

      - name: Configure and build
        shell: msys2 {0}
        run: |
          set -euxo pipefail
          cmake -S "${GITHUB_WORKSPACE}" -B "${GITHUB_WORKSPACE}/build" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build "${GITHUB_WORKSPACE}/build" --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: midirouter_Windows
          path: ${{ github.workspace }}/build/midirouter.exe
          if-no-files-found: warn
          retention-days: 14
